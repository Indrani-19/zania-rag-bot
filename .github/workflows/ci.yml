name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check app eval tests

      - name: Test (pytest)
        env:
          # Tests mock all OpenAI calls; this only satisfies pydantic Settings at import time.
          OPENAI_API_KEY: sk-fake-ci-key
        run: pytest -v
